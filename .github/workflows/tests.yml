name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.editorconfig'
      - '.gitignore'
      - '.gitattributes'
      - 'graphify-out/**'
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.editorconfig'
      - '.gitignore'
      - '.gitattributes'
      - 'graphify-out/**'

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app/**/*.php'
              - 'bootstrap/**/*.php'
              - 'config/**/*.php'
              - 'database/**/*.php'
              - 'routes/**/*.php'
              - 'tests/**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit.xml'
              - 'phpstan.neon'
            frontend:
              - 'resources/**/*'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'
              - 'vite.config.ts'

  ci:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Cache Node Modules and Built Assets
        id: frontend-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            public/build
          key: ${{ runner.os }}-frontend-${{ hashFiles('package-lock.json', 'resources/**/*', 'vite.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Setup Node
        if: ${{ needs.changes.outputs.frontend == 'true' || steps.frontend-cache.outputs.cache-hit != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        if: ${{ needs.changes.outputs.frontend == 'true' || steps.frontend-cache.outputs.cache-hit != 'true' }}
        run: npm i

      - name: Build Assets
        if: ${{ needs.changes.outputs.frontend == 'true' || steps.frontend-cache.outputs.cache-hit != 'true' }}
        run: npm run build

      - name: Run Type Analysis
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: composer types:check

      - name: Tests
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: php artisan test
