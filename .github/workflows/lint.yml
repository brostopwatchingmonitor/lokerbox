name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.editorconfig'
      - '.gitignore'
      - '.gitattributes'
      - 'graphify-out/**'
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.editorconfig'
      - '.gitignore'
      - '.gitattributes'
      - 'graphify-out/**'

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'app/**/*.php'
              - 'bootstrap/**/*.php'
              - 'config/**/*.php'
              - 'database/**/*.php'
              - 'routes/**/*.php'
              - 'tests/**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'pint.json'
              - 'phpstan.neon'
            frontend:
              - 'resources/**/*'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'
              - 'vite.config.ts'

  quality:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # backend linting
      - name: Setup PHP
        if: ${{ needs.changes.outputs.backend == 'true' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Pint
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: composer lint

      # frontend linting
      - name: Setup Node
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install Node Dependencies
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: npm install

      - name: Format Frontend
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: npm run format

      - name: Lint Frontend
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        run: npm run lint
